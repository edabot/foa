<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
  html, body { overflow: hidden; width: 100%; }
  body { padding: 16px; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #333;
    background: white;
    cursor: pointer;
    font-size: 13px;
  }
  .filter-btn.active { background: #333; color: white; }

  .day-section { margin-bottom: 32px; }
  .day-header {
    font-size: 22px;
    font-weight: bold;
    padding-bottom: 8px;
    border-bottom: 2px solid #333;
    margin-bottom: 16px;
  }

  .event-card {
    container-type: inline-size;
    display: flex;
    gap: 16px;
    padding: 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .event-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.1); }

  .event-image { width: 100px; height: 100px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .event-image-placeholder { width: 100px; height: 100px; background: #f0f0f0; border-radius: 6px; flex-shrink: 0; }

  .event-info { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }

  @container (max-width: 300px) {
    .event-card { flex-direction: column; }
    .event-image,
    .event-image-placeholder { width: 100%; height: 160px; }
  }
  .event-title { font-size: 16px; font-weight: bold; }
  .event-meta { font-size: 13px; color: #666; }
  .event-description { font-size: 13px; margin-top: 6px; line-height: 1.5; }
  .event-categories { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .category-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0f0f0; color: #555; }

  .no-events { color: #999; font-style: italic; padding: 12px 0; }
</style>

<div id="filters"></div>
<div id="events"></div>

<script>
  let allDays = [];
  let allCategories = [];
  let selectedCategories = [];

  function reportHeight() {
    requestAnimationFrame(() => {
      window.parent.postMessage({ type: 'RESIZE', height: document.body.scrollHeight }, '*');
    });
  }

  function render() {
    renderFilters();
    renderEvents();
    reportHeight();
  }

  function renderFilters() {
    const container = document.getElementById('filters');
    container.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn' + (selectedCategories.length === 0 ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.onclick = () => { selectedCategories = []; render(); };
    container.appendChild(allBtn);

    allCategories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (selectedCategories.includes(cat._id) ? ' active' : '');
      btn.textContent = cat.name;
      btn.onclick = () => {
        selectedCategories = selectedCategories.includes(cat._id)
          ? selectedCategories.filter(id => id !== cat._id)
          : [...selectedCategories, cat._id];
        render();
      };
      container.appendChild(btn);
    });
  }

  function createEventCard(event) {
    const card = document.createElement('div');
    card.className = 'event-card';
    card.onclick = () => window.open(event.url, '_blank');

    if (event.image) {
      const img = document.createElement('img');
      img.className = 'event-image';
      img.src = event.image;
      img.alt = event.title;
      card.appendChild(img);
    } else {
      const placeholder = document.createElement('div');
      placeholder.className = 'event-image-placeholder';
      card.appendChild(placeholder);
    }

    const info = document.createElement('div');
    info.className = 'event-info';

    const title = document.createElement('div');
    title.className = 'event-title';
    title.textContent = event.title;

    const time = document.createElement('div');
    time.className = 'event-meta';
    time.textContent = `${event.startTime} – ${event.endTime}`;

    const location = document.createElement('div');
    location.className = 'event-meta';
    location.textContent = event.location;

    const description = document.createElement('div');
    description.className = 'event-description';
    description.textContent = event.description;

    const categories = document.createElement('div');
    categories.className = 'event-categories';
    event.categories.forEach(cat => {
      const tag = document.createElement('span');
      tag.className = 'category-tag';
      tag.textContent = cat.name;
      categories.appendChild(tag);
    });

    info.append(title, time, location, description, categories);
    card.appendChild(info);
    return card;
  }

  function renderEvents() {
    const container = document.getElementById('events');
    container.innerHTML = '';

    allDays.forEach(day => {
      const filtered = selectedCategories.length === 0
        ? day.events
        : day.events.filter(event =>
            event.categories.some(cat => selectedCategories.includes(cat._id))
          );

      const section = document.createElement('div');
      section.className = 'day-section';

      const header = document.createElement('div');
      header.className = 'day-header';
      header.textContent = day.label;
      section.appendChild(header);

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-events';
        empty.textContent = 'No events for this day.';
        section.appendChild(empty);
      } else {
        filtered.forEach(event => section.appendChild(createEventCard(event)));
      }

      container.appendChild(section);
    });
  }

  window.addEventListener('message', e => {
    if (e.data?.type === 'LOAD_EVENTS') {
      allDays = e.data.data.days;
      allCategories = e.data.data.categories;
      render();
    }
  });

  window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
</script>
